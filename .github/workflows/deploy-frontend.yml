name: Deploy Frontend to Hostinger

on:
  push:
    branches:
      - main
    paths:
      - 'frontend-react/**'   # Only trigger when frontend files change

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy React App

    steps:
      - name: 🛎️ Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend-react/package-lock.json

      - name: 📦 Install dependencies
        working-directory: frontend-react
        run: npm install

      - name: 🏗️ Build frontend
        working-directory: frontend-react
        run: npx vite build
        env:
          VITE_API_URL: https://electionserver.issschoolpmna.in/api

      - name: 🚀 Deploy to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: frontend-react/dist/
          server-dir: /public_html/election/
          dangerous-clean-slate: false
