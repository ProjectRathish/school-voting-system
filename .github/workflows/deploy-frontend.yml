name: Deploy Frontend to Hostinger

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy React App

    steps:
      - name: 🛎️ Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend-react/package-lock.json

      - name: 📦 Install dependencies
        working-directory: frontend-react
        run: npm install

      - name: 🏗️ Build frontend
        working-directory: frontend-react
        run: npx vite build
        env:
          VITE_API_URL: https://electionserver.issschoolpmna.in/api

      - name: 🚀 Deploy to Hostinger via SSH/SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "frontend-react/dist/*"
          target: "/home/u515760001/domains/election.issschoolpmna.in/public_html"
          strip_components: 2
