name: Deploy to Production

on:
  push:
    branches:
      - main   # Triggers on every push to main branch

jobs:
  deploy:
    name: SSH & Deploy
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ─────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. SSH into server and run deploy ───────────────────────────────────
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e   # Stop immediately if any command fails

            cd ${{ secrets.APP_DIR }}

            # ── Helper function to safely set up or restore the symlink without losing files ───
            setup_uploads_symlink() {
              PERSISTENT_DIR="/var/uploads/school-voting"
              mkdir -p "$PERSISTENT_DIR"
              
              if [ -d "backend/public/uploads" ] && [ ! -L "backend/public/uploads" ]; then
                echo "⚠️  backend/public/uploads is a physical directory, not a symlink."
                if [ "$(ls -A backend/public/uploads)" ]; then
                  echo "📦 Migrating existing uploads to persistent directory..."
                  cp -rp backend/public/uploads/* "$PERSISTENT_DIR"/ || true
                fi
                rm -rf backend/public/uploads
              elif [ -L "backend/public/uploads" ]; then
                echo "🔗 backend/public/uploads is already a symlink, removing link safely..."
                rm -f backend/public/uploads
              else
                echo "🧹 Cleaning up path backend/public/uploads..."
                rm -rf backend/public/uploads
              fi
              
              mkdir -p backend/public
              ln -sfn "$PERSISTENT_DIR" backend/public/uploads
              echo "✅ Symlink set up: backend/public/uploads -> $PERSISTENT_DIR"
              
              # Ensure correct permissions so the node app and web server can read/write successfully
              chmod -R 755 "$PERSISTENT_DIR" || true
            }

            echo "🔗 Initial symlink and migration check..."
            setup_uploads_symlink

            echo "📦 Pulling latest code..."
            git pull origin main

            echo "🔗 Restoring symlink after git pull..."
            setup_uploads_symlink

            echo "🔄 Updating frontend dependencies & building..."
            cd frontend-react
            npm ci --prefer-offline
            npm run build

            echo "🔄 Updating backend dependencies..."
            cd ../backend
            npm ci --prefer-offline

            echo "🗄️  Running DB migrations..."
            node scripts/migrate_booth_name.js || true

            echo "♻️ Restarting backend..."
            pm2 restart school-voting || pm2 start server.js --name school-voting
            pm2 save

            echo "✅ Full deployment complete! Uploads safely at $PERSISTENT_UPLOADS"
