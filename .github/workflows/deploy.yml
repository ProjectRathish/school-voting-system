name: Deploy to Production

on:
  push:
    branches:
      - main   # Triggers on every push to main branch

jobs:
  deploy:
    name: SSH & Deploy
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ─────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. SSH into server and run deploy ───────────────────────────────────
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e   # Stop immediately if any command fails

            cd ${{ secrets.APP_DIR }}

            # ── Ensure persistent uploads directory exists outside the repo ───
            # This directory is NEVER touched by git pull
            PERSISTENT_UPLOADS="/var/uploads/school-voting"
            mkdir -p "$PERSISTENT_UPLOADS"

            echo "🔗 Setting up persistent uploads symlink..."
            # Remove the current uploads dir/symlink and replace with symlink to persistent store
            rm -rf backend/public/uploads
            mkdir -p backend/public
            ln -sfn "$PERSISTENT_UPLOADS" backend/public/uploads
            echo "   ✅ Symlink: backend/public/uploads -> $PERSISTENT_UPLOADS"

            echo "📦 Pulling latest code..."
            git pull origin main

            # Re-link after pull (git pull may have recreated the directory)
            rm -rf backend/public/uploads
            mkdir -p backend/public
            ln -sfn "$PERSISTENT_UPLOADS" backend/public/uploads
            echo "   ✅ Symlink restored after git pull"

            echo "🔄 Updating frontend dependencies & building..."
            cd frontend-react
            npm ci --prefer-offline
            npm run build

            echo "🔄 Updating backend dependencies..."
            cd ../backend
            npm ci --prefer-offline

            echo "🗄️  Running DB migrations..."
            node scripts/migrate_booth_name.js || true

            echo "♻️ Restarting backend..."
            pm2 restart school-voting || pm2 start server.js --name school-voting
            pm2 save

            echo "✅ Full deployment complete! Uploads safely at $PERSISTENT_UPLOADS"
