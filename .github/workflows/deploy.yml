name: Deploy to Production

on:
  push:
    branches:
      - main   # Triggers on every push to main branch

jobs:
  deploy:
    name: SSH & Deploy
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ─────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. SSH into server and run deploy ───────────────────────────────────
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e   # Stop immediately if any command fails

            echo "📦 Pulling latest code..."
            cd ${{ secrets.APP_DIR }}
            
            # Back up existing uploads to a safe directory outside the repo
            if [ -d "backend/public/uploads" ] && [ "$(ls -A backend/public/uploads)" ]; then
              echo "📦 Backing up uploads..."
              mkdir -p ../temp_uploads_backup
              cp -r backend/public/uploads/* ../temp_uploads_backup/ || true
            fi

            git pull origin main

            # Restore uploads
            if [ -d "../temp_uploads_backup" ]; then
              echo "📦 Restoring uploads..."
              mkdir -p backend/public/uploads
              cp -r ../temp_uploads_backup/* backend/public/uploads/ || true
              rm -rf ../temp_uploads_backup
            fi

            echo "🔄 Updating frontend dependencies & building..."
            cd frontend-react
            npm ci --prefer-offline
            npm run build

            echo "🔄 Updating backend dependencies..."
            cd ../backend
            npm ci --prefer-offline

            echo "♻️ Restarting backend..."
            pm2 restart school-voting || pm2 start server.js --name school-voting
            pm2 save

            echo "✅ Full deployment complete!"
